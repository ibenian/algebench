<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AlgeBench — Proof Animation</title>
  <!-- KaTeX from the same CDN the rest of AlgeBench uses. The CSP on /renderproof
       still forbids inline script, so the page logic loads as an external module
       (/renderproof.js); safety rests on the renderer's KaTeX trust filter +
       textContent + schema validation, not on asset origin. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <link rel="stylesheet" href="/proof-animation/proof-animation.css?v=__APP_VERSION__">
  <style>
    /* Dark by default (matches the standalone proof-animation page); renderproof.js
       sets html[data-theme="light"] when ?theme=light (or auto resolves to light).
       The proof engine themes off --panel-bg/--text-color/etc. (light fallbacks when
       unset), so driving them here themes the cards too, not just the page chrome. */
    :root {
      color-scheme: dark;
      --panel-bg: #1a1a2e; --text-color: #e5e7eb; --muted-color: #9ca3af; --border-color: #2a2f45;
      --page-bg: #12121c; --title-fg: #cbd5e1;
      --btn-bg: #1f2937; --btn-fg: #e5e7eb; --btn-border: #374151; --btn-hover: #273449;
      --err-fg: #fca5a5; --err-bg: #2a1414; --err-border: #7f1d1d;
    }
    html[data-theme="light"] {
      color-scheme: light;
      --panel-bg: #ffffff; --text-color: #1a1a2e; --muted-color: #6b7280; --border-color: #e5e7eb;
      --page-bg: #f6f7fb; --title-fg: #4b5563;
      --btn-bg: #ffffff; --btn-fg: #374151; --btn-border: #cbd5e1; --btn-hover: #f1f5f9;
      --err-fg: #b91c1c; --err-bg: #fef2f2; --err-border: #fecaca;
    }
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
           margin: 0; padding: 0; background: var(--page-bg); color: var(--text-color); }
    html { scrollbar-width: thin; scrollbar-color: var(--border-color) transparent; }
    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 8px;
           border: 3px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background-color: var(--muted-color); }
    .wrap { max-width: 820px; margin: 0 auto; padding: 24px 20px 56px; }
    @media (max-width: 480px) { .wrap { padding: 14px 12px 40px; } }
    .pa-bar { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin: 0 0 10px; }
    /* Brand wordmark on the left: frames the standalone gallery and is a quiet
       funnel — every shared/standalone proof links back to the main app. Pushed
       left with margin-right:auto so the action buttons stay right. Hidden in the
       embed (chrome is trimmed there). */
    /* Page-title banner: a full-width header band, separated from the proofs below
       by a divider + breathing room. */
    .pa-brand { display: flex; flex-direction: column; gap: 3px;
                margin: 0 0 28px; padding: 0 0 16px;
                border-bottom: 1px solid var(--border-color);
                text-decoration: none; line-height: 1.2; }
    .pa-brand-name { font-weight: 700; font-size: 1.4rem; letter-spacing: -.01em;
                color: var(--title-fg); }
    .pa-brand-sub { font-size: .82rem; color: var(--muted-color); }
    .pa-brand:hover .pa-brand-name { color: var(--text-color); }
    html[data-embedded] .pa-brand { display: none; }
    /* Non-embedded: renderproof.js moves the action bar onto the FIRST proof's
       title row (instead of a separate line above it), so the title and the
       { } / < > buttons share one row. */
    .pa-card-title.pa-has-actions { display: flex; align-items: center;
                justify-content: space-between; gap: 10px; }
    .pa-card-title.pa-has-actions .pa-bar { margin: 0; }
    /* Match the card's bottom padding to the divider→buttons gap (the controls'
       padding-top) so the space under the buttons isn't visibly larger than above. */
    .wrap .pa-root { padding-bottom: 12px; }
    .pa-uibtn { font: inherit; font-size: .85rem; cursor: pointer; border: 1px solid var(--btn-border);
              background: var(--btn-bg); color: var(--btn-fg); border-radius: 7px; padding: 6px 12px; }
    .pa-uibtn:hover { background: var(--btn-hover); }
    .pa-uibtn.pa-icon-btn { padding: 5px; line-height: 0; display: inline-flex; align-items: center; }
    .pa-embed-row { display: flex; align-items: center; gap: 10px; margin: 6px 0 8px; flex-wrap: wrap; }
    .pa-embed-row label { font-size: .85rem; color: var(--muted-color);
              display: flex; align-items: center; gap: 6px; }
    .pa-embed-row select { font: inherit; font-size: .85rem; padding: 5px 8px; border-radius: 7px;
              border: 1px solid var(--btn-border); background: var(--btn-bg); color: var(--btn-fg); }
    .pa-copied { font-size: .8rem; color: var(--muted-color); }
    #pa-embed-code { width: 100%; box-sizing: border-box; height: 80px; resize: vertical;
              font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .8rem;
              border: 1px solid var(--btn-border); border-radius: 7px; padding: 8px;
              background: var(--panel-bg); color: var(--text-color); }
    .pa-card-title { font-size: 1rem; font-weight: 600; color: var(--title-fg); margin: 28px 0 8px; }
    .pa-card-title:first-of-type { margin-top: 4px; }
    /* Embedded: trim chrome to the proof. Overlay the full-screen icon in the
       top-right corner instead of giving it a whole row, and cut the page padding;
       the host-side resizer then sizes the iframe to this tight content height. */
    /* No scrollbars in the embed: the host sizes the iframe to content, and a hover
       tooltip that overflows must not spawn a scrollbar (which would reflow → resize
       → flicker). Term tooltips are position:fixed, so they're not clipped by this. */
    html[data-embedded] { overflow: hidden; }
    html[data-embedded] .wrap { padding: 8px 12px; position: relative; }
    html[data-embedded] .pa-bar { position: absolute; top: 8px; right: 10px; margin: 0; z-index: 5; }
    /* Reserve a header row for the first title so the overlaid icon sits beside it
       with equal breathing room above and below — not jammed against the card. */
    html[data-embedded] .pa-card-title:first-of-type {
      margin-top: 0; min-height: 26px; display: flex; align-items: center; padding-right: 40px; }
    .pa-error { color: var(--err-fg); background: var(--err-bg); border: 1px solid var(--err-border);
                border-radius: 8px; padding: 12px 14px; margin: 12px 0; font-size: .9rem; }
    /* Themed modal overlay — shared by the { } JSON viewer and the < > embed dialog. */
    .pa-modal { position: fixed; inset: 0; z-index: 50; display: none;
                align-items: center; justify-content: center; padding: 16px;
                background: rgba(0, 0, 0, .5); }
    .pa-modal.open { display: flex; }
    .pa-modal-box { background: var(--panel-bg); color: var(--text-color);
                border: 1px solid var(--border-color); border-radius: 10px;
                width: 100%; max-width: 760px; max-height: 90%; display: flex; flex-direction: column;
                box-shadow: 0 10px 40px rgba(0, 0, 0, .5); }
    .pa-modal-head { display: flex; align-items: center; justify-content: space-between; gap: 10px;
                padding: 10px 14px; border-bottom: 1px solid var(--border-color);
                font-family: system-ui, sans-serif; font-weight: 600; font-size: .9rem; }
    .pa-modal-body { overflow: auto; padding: 10px 14px 14px; }
    .pa-modal-body h3 { font: 600 .78rem system-ui, sans-serif; color: var(--muted-color); margin: 14px 0 4px; }
    .pa-modal-body pre { margin: 6px 0 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 12px; line-height: 1.5; white-space: pre; overflow-x: auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="pa-brand" href="/" aria-label="AlgeBench home">
      <span class="pa-brand-name">AlgeBench</span>
      <span class="pa-brand-sub">animated, step-by-step proofs</span>
    </a>
    <div class="pa-bar">
      <button id="pa-json" class="pa-uibtn" type="button" hidden></button>
      <button id="pa-embed" class="pa-uibtn" type="button" hidden></button>
      <button id="pa-action" class="pa-uibtn" type="button" hidden></button>
    </div>
    <div id="root"></div>
  </div>
  <div id="pa-embed-modal" class="pa-modal">
    <div class="pa-modal-box">
      <div class="pa-modal-head">
        <span>Embed this proof</span>
        <button id="pa-embed-close" class="pa-uibtn" type="button" aria-label="Close">✕</button>
      </div>
      <div class="pa-modal-body">
        <div class="pa-embed-row">
          <label>Theme
            <select id="pa-theme">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="auto">Auto</option>
            </select>
          </label>
          <button id="pa-preview" class="pa-uibtn" type="button">Preview</button>
          <button id="pa-copy" class="pa-uibtn" type="button">Copy</button>
          <span id="pa-copied" class="pa-copied" hidden>Copied!</span>
        </div>
        <textarea id="pa-embed-code" readonly aria-label="Embed script"></textarea>
      </div>
    </div>
  </div>
  <div id="pa-json-modal" class="pa-modal">
    <div class="pa-modal-box">
      <div class="pa-modal-head">
        <span>Proof JSON</span>
        <button id="pa-json-close" class="pa-uibtn" type="button" aria-label="Close">✕</button>
      </div>
      <div id="pa-json-body" class="pa-modal-body"></div>
    </div>
  </div>
  <script type="module" src="/renderproof.js?v=__APP_VERSION__"></script>
</body>
</html>
