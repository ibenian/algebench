name: Lines of Code Report

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: loc-report
  cancel-in-progress: true

jobs:
  loc-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@v2
        with:
          tool: tokei@14.0.0

      - name: Generate report
        run: ./scripts/loc-report.sh LOC-REPORT.md

      - name: Post summary
        run: cat LOC-REPORT.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LOC-REPORT.md
          git diff --cached --quiet || git commit -m "docs: update lines-of-code report [skip ci]"
          git pull --rebase
          git push
