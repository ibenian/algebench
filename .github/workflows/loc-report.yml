name: Lines of Code Report

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: loc-report-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  loc-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: taiki-e/install-action@v2
        with:
          tool: tokei@14.0.0

      - name: Generate report
        run: ./scripts/loc-report.sh LOC-REPORT.md

      - name: Post summary
        run: cat LOC-REPORT.md >> "$GITHUB_STEP_SUMMARY"

      - name: Determine destination directory
        id: dest
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "dir=loc-report/pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "dir=loc-report" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate HTML site
        run: |
          mkdir -p _site
          python3 scripts/loc_report_to_html.py LOC-REPORT.md --outdir _site

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: ${{ steps.dest.outputs.dir }}
          keep_files: true

      - name: Post preview URL
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIEW_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ steps.dest.outputs.dir }}/"
          echo "## 📊 LOC Report Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "Preview: ${PREVIEW_URL}" >> "$GITHUB_STEP_SUMMARY"
          EXISTING=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq '[.comments[] | select(.body | contains("LOC Report"))] | length')
          if [ "$EXISTING" = "0" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "## 📊 LOC Report
**Preview:** ${PREVIEW_URL}"
          fi
