name: PR Preview Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

# Serialize gh-pages deploys across ALL report workflows (shared group name) so
# concurrent pushes can't reject each other with a non-fast-forward. Queue, don't
# cancel — this cleanup pushes to gh-pages too.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  cleanup:
    name: Remove PR previews
    runs-on: ubuntu-latest
    steps:
      - name: Check gh-pages branch exists
        id: check
        run: |
          if git ls-remote --exit-code --heads "https://github.com/${{ github.repository }}.git" gh-pages >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout gh-pages
        if: steps.check.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR directories
        if: steps.check.outputs.exists == 'true'
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          REMOVED=false
          for DIR in "semantic-graph/pr-${PR_NUM}" "loc-report/pr-${PR_NUM}"; do
            if [ -d "$DIR" ]; then
              git rm -rf "$DIR"
              REMOVED=true
            fi
          done
          if [ "$REMOVED" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: clean up previews for PR #${PR_NUM}"
            git push
          else
            echo "No preview directories found for PR #${PR_NUM}"
          fi
