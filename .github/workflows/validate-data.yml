name: Validate Data Files

on:
  pull_request:
    paths:
      - 'scenes/**/*.json'
      - 'scenes/*.json'
      - 'themes/semantic-graph/**/*.json'
      - 'schemas/*.schema.json'
      - 'scripts/validate_schema.py'
      - 'scripts/validate_content.py'
      - 'scripts/lint_scene.py'
  workflow_dispatch:

jobs:
  validate:
    name: Schema, Content & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Resolve changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...HEAD)
            # Published scenes only — scenes/draft/** are WIP and skipped.
            SCENES=$(echo "$DIFF" | grep -E '^scenes/[^/]+\.json$' || true)
            THEMES=$(echo "$DIFF" | grep '^themes/semantic-graph/.*\.json$' || true)
            # If the shared schema or validator changed, re-validate everything.
            if echo "$DIFF" | grep -qE '^(schemas/.*\.schema\.json|scripts/validate_schema\.py)$'; then
              SCENES=$(find scenes -maxdepth 1 -name '*.json' 2>/dev/null)
              THEMES=$(find themes/semantic-graph -name '*.json' 2>/dev/null)
            fi
          else
            SCENES=$(find scenes -maxdepth 1 -name '*.json' 2>/dev/null)
            THEMES=$(find themes/semantic-graph -name '*.json' 2>/dev/null)
          fi
          SCENES_FLAT=$(echo "$SCENES" | tr '\n' ' ' | sed 's/[[:space:]]*$//')
          THEMES_FLAT=$(echo "$THEMES" | tr '\n' ' ' | sed 's/[[:space:]]*$//')
          echo "scenes=${SCENES_FLAT}" >> "$GITHUB_OUTPUT"
          echo "themes=${THEMES_FLAT}" >> "$GITHUB_OUTPUT"

      - name: Scene schema validation
        id: schema
        if: steps.changed.outputs.scenes != ''
        run: |
          python scripts/validate_schema.py -v ${{ steps.changed.outputs.scenes }} 2>&1 | tee /tmp/schema-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Scene content validation
        id: content
        if: steps.changed.outputs.scenes != '' && steps.schema.outputs.exit_code == '0'
        run: |
          python scripts/validate_content.py ${{ steps.changed.outputs.scenes }} 2>&1 | tee /tmp/content-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Scene lint
        id: lint
        if: steps.changed.outputs.scenes != ''
        run: |
          FAILED=0
          : > /tmp/lint-output.txt
          for f in ${{ steps.changed.outputs.scenes }}; do
            python scripts/lint_scene.py "$f" 2>&1 | tee -a /tmp/lint-output.txt
            [ "${PIPESTATUS[0]}" != "0" ] && FAILED=1
          done
          echo "exit_code=${FAILED}" >> "$GITHUB_OUTPUT"

      - name: Theme schema validation
        id: theme
        if: steps.changed.outputs.themes != ''
        run: |
          python scripts/validate_schema.py --schema semantic-graph-theme -v ${{ steps.changed.outputs.themes }} 2>&1 | tee /tmp/theme-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post validation report as PR comment
        if: github.event_name == 'pull_request' && (steps.changed.outputs.scenes != '' || steps.changed.outputs.themes != '') && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCHEMA_OUT=$(cat /tmp/schema-output.txt 2>/dev/null || echo "Not run")
          CONTENT_OUT=$(cat /tmp/content-output.txt 2>/dev/null || echo "Not run")
          LINT_OUT=$(cat /tmp/lint-output.txt 2>/dev/null || echo "Not run")
          THEME_OUT=$(cat /tmp/theme-output.txt 2>/dev/null || echo "Not run")

          SCHEMA_EXIT="${{ steps.schema.outputs.exit_code }}"
          CONTENT_EXIT="${{ steps.content.outputs.exit_code }}"
          LINT_EXIT="${{ steps.lint.outputs.exit_code }}"
          THEME_EXIT="${{ steps.theme.outputs.exit_code }}"

          icon() {
            local exit_code="$1" output="$2"
            # Empty exit_code means the step was skipped (no files of that kind changed).
            if [ -z "$exit_code" ]; then echo "⏭️"; return; fi
            if [ "$exit_code" != "0" ]; then echo "❌"; return; fi
            # Only flag ⚠️ when there's an actual non-zero count or explicit
            # warning marker — a literal "0 auto-fixable" shouldn't trigger it.
            if echo "$output" | grep -qiE '(^|[^0-9])([1-9][0-9]*)\s+auto-fixable'; then echo "⚠️"; return; fi
            if echo "$output" | grep -qiE '(warning|⚠️)'; then echo "⚠️"; return; fi
            echo "✅"
          }
          SCHEMA_ICON=$(icon "$SCHEMA_EXIT" "$SCHEMA_OUT")
          CONTENT_ICON=$(icon "$CONTENT_EXIT" "$CONTENT_OUT")
          LINT_ICON=$(icon "$LINT_EXIT" "$LINT_OUT")
          THEME_ICON=$(icon "$THEME_EXIT" "$THEME_OUT")

          BODY="<!-- data-validation-report -->
          ### Data Validation Report

          | Check | Status |
          |-------|--------|
          | Scene Schema | ${SCHEMA_ICON} |
          | Scene Content | ${CONTENT_ICON} |
          | Scene Lint | ${LINT_ICON} |
          | Theme Schema | ${THEME_ICON} |

          <details>
          <summary>Scene Schema Validation</summary>

          \`\`\`
          ${SCHEMA_OUT}
          \`\`\`

          </details>

          <details>
          <summary>Scene Content Validation</summary>

          \`\`\`
          ${CONTENT_OUT}
          \`\`\`

          </details>

          <details>
          <summary>Scene Lint</summary>

          \`\`\`
          ${LINT_OUT}
          \`\`\`

          </details>

          <details>
          <summary>Theme Schema Validation</summary>

          \`\`\`
          ${THEME_OUT}
          \`\`\`

          </details>"

          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$BODY" \
            --edit-last 2>/dev/null || \
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$BODY"

      - name: Fail if any check errored
        if: (steps.changed.outputs.scenes != '' || steps.changed.outputs.themes != '') && always()
        run: |
          FAILED=0
          [ "${{ steps.schema.outputs.exit_code }}" != "0" ] && [ -n "${{ steps.schema.outputs.exit_code }}" ] && FAILED=1
          [ "${{ steps.content.outputs.exit_code }}" != "0" ] && [ -n "${{ steps.content.outputs.exit_code }}" ] && FAILED=1
          [ "${{ steps.lint.outputs.exit_code }}" != "0" ] && [ -n "${{ steps.lint.outputs.exit_code }}" ] && FAILED=1
          [ "${{ steps.theme.outputs.exit_code }}" != "0" ] && [ -n "${{ steps.theme.outputs.exit_code }}" ] && FAILED=1
          if [ "$FAILED" = "1" ]; then
            echo "❌ One or more validation checks failed — see the PR comment for details."
            exit 1
          fi

      - name: No data files changed
        if: steps.changed.outputs.scenes == '' && steps.changed.outputs.themes == ''
        run: echo "No scene or theme files changed — skipping validation"
