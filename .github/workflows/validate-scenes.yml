name: Validate Scene Files

on:
  pull_request:
    paths:
      - 'scenes/**/*.json'
      - 'scenes/*.json'
      - 'schemas/lesson.schema.json'
      - 'scripts/validate_schema.py'
      - 'scripts/validate_content.py'
      - 'scripts/lint_scene.py'
  workflow_dispatch:

jobs:
  validate:
    name: Schema, Content & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Resolve scene files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...HEAD \
              | grep '^scenes/.*\.json$' | tr '\n' ' ')
          else
            CHANGED=$(find scenes -name '*.json' | tr '\n' ' ')
          fi
          echo "files=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: Schema validation
        id: schema
        if: steps.changed.outputs.files != ''
        run: |
          python scripts/validate_schema.py -v ${{ steps.changed.outputs.files }} 2>&1 | tee /tmp/schema-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Content validation
        id: content
        if: steps.changed.outputs.files != '' && steps.schema.outputs.exit_code == '0'
        run: |
          python scripts/validate_content.py ${{ steps.changed.outputs.files }} 2>&1 | tee /tmp/content-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Lint
        id: lint
        if: steps.changed.outputs.files != ''
        run: |
          FAILED=0
          : > /tmp/lint-output.txt
          for f in ${{ steps.changed.outputs.files }}; do
            python scripts/lint_scene.py "$f" 2>&1 | tee -a /tmp/lint-output.txt
            [ "${PIPESTATUS[0]}" != "0" ] && FAILED=1
          done
          echo "exit_code=${FAILED}" >> "$GITHUB_OUTPUT"

      - name: Post validation report as PR comment
        if: github.event_name == 'pull_request' && steps.changed.outputs.files != '' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCHEMA_OUT=$(cat /tmp/schema-output.txt 2>/dev/null || echo "Not run")
          CONTENT_OUT=$(cat /tmp/content-output.txt 2>/dev/null || echo "Not run")
          LINT_OUT=$(cat /tmp/lint-output.txt 2>/dev/null || echo "Not run")

          SCHEMA_EXIT="${{ steps.schema.outputs.exit_code }}"
          CONTENT_EXIT="${{ steps.content.outputs.exit_code }}"
          LINT_EXIT="${{ steps.lint.outputs.exit_code }}"

          icon() {
            local exit_code="$1" output="$2"
            if [ "$exit_code" != "0" ]; then echo "❌"; return; fi
            # Only flag ⚠️ when there's an actual non-zero count or explicit
            # warning marker — a literal "0 auto-fixable" shouldn't trigger it.
            if echo "$output" | grep -qiE '(^|[^0-9])([1-9][0-9]*)\s+auto-fixable'; then echo "⚠️"; return; fi
            if echo "$output" | grep -qiE '(warning|⚠️)'; then echo "⚠️"; return; fi
            echo "✅"
          }
          SCHEMA_ICON=$(icon "$SCHEMA_EXIT" "$SCHEMA_OUT")
          CONTENT_ICON=$(icon "$CONTENT_EXIT" "$CONTENT_OUT")
          LINT_ICON=$(icon "$LINT_EXIT" "$LINT_OUT")

          BODY="<!-- scene-validation-report -->
          ### Scene Validation Report

          | Check | Status |
          |-------|--------|
          | Schema | ${SCHEMA_ICON} |
          | Content | ${CONTENT_ICON} |
          | Lint | ${LINT_ICON} |

          <details>
          <summary>Schema Validation</summary>

          \`\`\`
          ${SCHEMA_OUT}
          \`\`\`

          </details>

          <details>
          <summary>Content Validation</summary>

          \`\`\`
          ${CONTENT_OUT}
          \`\`\`

          </details>

          <details>
          <summary>Lint</summary>

          \`\`\`
          ${LINT_OUT}
          \`\`\`

          </details>"

          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$BODY" \
            --edit-last 2>/dev/null || \
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$BODY"

      - name: Fail if any check errored
        if: steps.changed.outputs.files != '' && always()
        run: |
          FAILED=0
          [ "${{ steps.schema.outputs.exit_code }}" != "0" ] && [ -n "${{ steps.schema.outputs.exit_code }}" ] && FAILED=1
          [ "${{ steps.content.outputs.exit_code }}" != "0" ] && [ -n "${{ steps.content.outputs.exit_code }}" ] && FAILED=1
          [ "${{ steps.lint.outputs.exit_code }}" != "0" ] && [ -n "${{ steps.lint.outputs.exit_code }}" ] && FAILED=1
          if [ "$FAILED" = "1" ]; then
            echo "❌ One or more validation checks failed — see the PR comment for details."
            exit 1
          fi

      - name: No scene files changed
        if: steps.changed.outputs.files == ''
        run: echo "No scene files changed — skipping validation"
