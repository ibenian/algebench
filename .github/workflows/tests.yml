name: Tests

# `pytest` is a REQUIRED status check (the "main protection" ruleset), so it must
# report on every PR — path-filtering the workflow would leave a docs-only PR
# stuck on "Expected — waiting for status to be reported" forever. So the suite
# ALWAYS runs (the check always reports); what varies is depth: a PR that touches
# Python runs the FULL exhaustive cross-product (~504 combos), while a PR with no
# Python changes runs a faster SAMPLED subset (conftest's default 200). push(main)
# and manual dispatch always run exhaustive — main must stay fully green.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Python changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - '**/*.py'
              - 'pyproject.toml'
              - 'pytest.ini'
              - 'setup.cfg'
              - 'conftest.py'
              - 'requirements*.txt'
              - 'run.sh'
              - 'algebench'
              - '.github/workflows/tests.yml'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test runner
        run: |
          ./run.sh -m pip install pytest -q

      - name: Run tests
        id: tests
        run: |
          # Full exhaustive cross-product when Python changed (or on push/dispatch);
          # otherwise a faster sampled run (conftest defaults to --sampled 200).
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ steps.changes.outputs.python }}" == "true" ]; then
            MODE="--exhaustive"
            echo "::notice title=Test depth::Python changed — running FULL exhaustive suite (~504 combos)"
          else
            MODE=""
            echo "::notice title=Test depth::No Python changes — running SAMPLED suite (200)"
          fi
          ./run.sh -m pytest tests/ -v --tb=short $MODE --junitxml=test-results.xml 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post failure report as PR comment
        if: github.event_name == 'pull_request' && steps.tests.outputs.exit_code != '' && steps.tests.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(cat test-output.txt)
          SUMMARY=$(echo "$OUTPUT" | grep -E '^\s*=+.*(passed|failed|error)' | tail -1 | sed 's/=//g' | xargs)
          FAILED=$(echo "$OUTPUT" | grep '^FAILED ' | sed 's/^FAILED //' || true)

          BODY="<!-- test-report -->
          ### ❌ Test Failures

          **${SUMMARY}**

          \`\`\`
          ${FAILED}
          \`\`\`

          <details>
          <summary>Full Output</summary>

          \`\`\`
          ${OUTPUT}
          \`\`\`

          </details>"

          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$BODY" \
            --edit-last 2>/dev/null || \
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$BODY"

      - name: Fail if tests failed
        if: always() && steps.tests.outputs.exit_code != '' && steps.tests.outputs.exit_code != '0'
        run: |
          echo "❌ Tests failed"
          exit 1
