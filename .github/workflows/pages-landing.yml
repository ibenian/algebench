name: GitHub Pages Landing

on:
  push:
    branches: [main]
    paths:
      - 'docs/landing-page/**'
  workflow_dispatch:

permissions:
  contents: write

# Serialize gh-pages deploys across ALL report workflows (shared group name) so
# concurrent pushes can't reject each other with a non-fast-forward. Queue, don't
# cancel — every report deploy must land.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          # Publish static web assets from the landing-page tree (any depth, incl.
          # blog/) by file type. New pages/assets ship without a workflow edit, but
          # stray non-static files (notes, drafts, .DS_Store) are never published.
          mkdir -p _site
          cd docs/landing-page
          find . -type f \( \
              -name '*.html' -o -name '*.css' -o -name '*.js' -o -name '*.png' \) \
            -exec cp --parents {} ../../_site/ \;

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: true
